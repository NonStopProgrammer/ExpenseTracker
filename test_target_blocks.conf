# ============================================================================
#  Neo4J loader test config  (HOCON)  -  SQL Server -> Neo4J
#
#  Three SEE entries, one per scenario. Each: source = SQL Server table,
#  extract = SELECT (includes codi_ingestion_ts audit column), target = Neo4J.
#
#  Connections (resolved from logonmgr by connectionName):
#     codi_sql_codi    -> SQL Server (source)
#     codi_neo4j_codi  -> Neo4J     (target; provides url/user/enpw)
#
#  tableDetails.dbName under the Neo4J target = the Neo4J DATABASE name
#  (becomes the connector "database" option). Adjust "neo4j" if yours differs.
#
#  neo4j.saveMode = "overwrite"  -> MERGE nodes/edges; endpoints created if missing.
#  Routing to Neo4JLoadHelper.loadNeo4J is by your app wiring on dbType="neo4j".
#  The extract/source blocks are a minimal scaffold - adjust to your runner.
# ============================================================================

codiSEE = {

  appInfo = {
    appName = "NEO4J_LOAD_TEST"
    LOB     = "CODI"
  }

  SEE = [

    # ------------------------------------------------------------------------
    # SCENARIO 1: NODE ONLY  -> :Customer
    # ------------------------------------------------------------------------
    {
      source = {
        dbType         = "mssql"
        dbName         = "dbRawFiserv"
        table          = "CODI.SEE_TEST_CUSTOMER_NODES"
        connectionName = "codi_sql_codi"
      }
      extract = {
        stagingQuery = ""
        schedule     = "NA"
        extractQuery = "SELECT customer_id, customer_name, customer_segment, city, codi_ingestion_ts FROM CODI.SEE_TEST_CUSTOMER_NODES"
      }
      target = {
        extractType = "neo4j"
        tableDetails = {
          dbType            = "neo4j"
          dbName            = "neo4j"
          connectionName    = "codi_neo4j_codi"
          saveMode          = "append"
          customIngestionTS = "codi_ingestion_ts"
          neo4j = {
            saveMode = "overwrite"
            loadType = "nodes"
            nodes = [
              { labels = "Customer", nodeKeys = "customer_id" }
            ]
          }
        }
      }
    },

    # ------------------------------------------------------------------------
    # SCENARIO 2: RELATIONSHIP ONLY  -> (:Order)-[:PLACED_BY]->(:Customer)
    # ------------------------------------------------------------------------
    {
      source = {
        dbType         = "mssql"
        dbName         = "dbRawFiserv"
        table          = "CODI.SEE_TEST_ORDER_REL"
        connectionName = "codi_sql_codi"
      }
      extract = {
        stagingQuery = ""
        schedule     = "NA"
        extractQuery = "SELECT order_id, customer_id, order_channel, codi_ingestion_ts FROM CODI.SEE_TEST_ORDER_REL"
      }
      target = {
        extractType = "neo4j"
        tableDetails = {
          dbType            = "neo4j"
          dbName            = "neo4j"
          connectionName    = "codi_neo4j_codi"
          saveMode          = "append"
          customIngestionTS = "codi_ingestion_ts"
          neo4j = {
            saveMode = "overwrite"
            loadType = "relationships"
            relationships = [
              {
                relationshipType = "PLACED_BY"
                source = { labels = "Order",    nodeKeys = "order_id" }
                target = { labels = "Customer", nodeKeys = "customer_id" }
              }
            ]
          }
        }
      }
    },

    # ------------------------------------------------------------------------
    # SCENARIO 3: NODES + RELATIONSHIP (single DataFrame)
    #   :Order, :Customer, (:Order)-[:PLACED_BY]->(:Customer)
    # ------------------------------------------------------------------------
    {
      source = {
        dbType         = "mssql"
        dbName         = "dbRawFiserv"
        table          = "CODI.SEE_TEST_ORDER_CUSTOMER"
        connectionName = "codi_sql_codi"
      }
      extract = {
        stagingQuery = ""
        schedule     = "NA"
        extractQuery = "SELECT order_id, order_amount, order_status, customer_id, customer_name, customer_city, codi_ingestion_ts FROM CODI.SEE_TEST_ORDER_CUSTOMER"
      }
      target = {
        extractType = "neo4j"
        tableDetails = {
          dbType            = "neo4j"
          dbName            = "neo4j"
          connectionName    = "codi_neo4j_codi"
          saveMode          = "append"
          customIngestionTS = "codi_ingestion_ts"
          neo4j = {
            saveMode = "overwrite"
            loadType = "both"
            nodes = [
              { labels = "Order",    nodeKeys = "order_id",    properties = "order_id,order_amount,order_status" },
              { labels = "Customer", nodeKeys = "customer_id", properties = "customer_id,customer_name,customer_city" }
            ]
            relationships = [
              {
                relationshipType = "PLACED_BY"
                source     = { labels = "Order",    nodeKeys = "order_id" }
                target     = { labels = "Customer", nodeKeys = "customer_id" }
                properties = "order_id,customer_id"
              }
            ]
          }
        }
      }
    }

  ]
}
